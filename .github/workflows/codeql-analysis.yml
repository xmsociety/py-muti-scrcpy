name: "CodeQL"

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - "demo.png"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".github/workflows/docs.yml"
      - "demo.png"
  schedule:
    - cron: "17 6 * * 2"  # 每周二 06:17 UTC

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      # Python 是解释型语言，不需要 autobuild 步骤；CodeQL 直接对源文件做静态分析。
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
